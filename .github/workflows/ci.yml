name: Retrain Model and Push Docker Image

on:
  push:
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 pandas scikit-learn
        
    - name: Run MLflow Project (Retrain Model)
      run: |
        cd MLProject
        mlflow run . --env-manager=local
        
    - name: Upload Artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: MLProject/mlruns/
        
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and Push Docker Image using MLflow
      run: |
        RUN_ID=$(ls -t MLProject/mlruns/0 | head -n 1)
        mlflow models build-docker -m "MLProject/mlruns/0/$RUN_ID/artifacts/model" -n "${{ secrets.DOCKER_USERNAME }}/dicoding-msml-model:latest" --env-manager=local
        docker push "${{ secrets.DOCKER_USERNAME }}/dicoding-msml-model:latest"
